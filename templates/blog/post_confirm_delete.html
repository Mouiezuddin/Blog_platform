{% extends 'base.html' %}
{% block title %}Delete Post{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-3xl p-8 text-center">
        <div class="w-16 h-16 rounded-2xl bg-red-500/10 border border-red-500/20 flex items-center justify-center mx-auto mb-5">
            <span class="material-icons-round text-red-400 text-3xl">delete_forever</span>
        </div>
        <h1 class="font-display text-2xl font-bold text-white mb-2">Delete Post?</h1>
        <p class="text-gray-500 mb-6">You're about to permanently delete <span class="text-white font-medium">"{{ post.title }}"</span>. This action cannot be undone.</p>
        
        <form method="post" class="flex gap-3">
            {% csrf_token %}
            <button type="submit" class="flex-1 py-3 rounded-xl bg-red-600 hover:bg-red-500 text-white font-semibold transition-all">
                Yes, Delete
            </button>
            <a href="{{ post.get_absolute_url }}" class="flex-1 py-3 rounded-xl border border-gray-700 text-gray-400 hover:text-white hover:border-gray-600 transition-all flex items-center justify-center">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
