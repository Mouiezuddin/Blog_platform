{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-16">
    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center mx-auto mb-5 shadow-lg shadow-indigo-500/30">
                    <span class="material-icons-round text-white text-2xl">lock_open</span>
                </div>
                <h1 class="font-display text-2xl font-bold text-white">Welcome Back</h1>
                <p class="text-gray-500 text-sm mt-2">Sign in to your Developers Tale account</p>
            </div>
            
            <form method="post" class="space-y-5">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Username</label>
                    <div class="relative">
                        <span class="material-icons-round absolute left-3 top-1/2 -translate-y-1/2 text-gray-600">person</span>
                        <input type="text" name="username" required autocomplete="username"
                            class="w-full pl-10 pr-4 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/50 transition-all"
                            placeholder="Your username">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                    <div class="relative">
                        <span class="material-icons-round absolute left-3 top-1/2 -translate-y-1/2 text-gray-600">lock</span>
                        <input type="password" name="password" id="password-input" required autocomplete="current-password"
                            class="w-full pl-10 pr-11 py-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/50 transition-all"
                            placeholder="Your password">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-600 hover:text-gray-400 transition-colors">
                            <span class="material-icons-round text-xl" id="eye-icon">visibility</span>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="w-full flex items-center justify-center gap-2 py-3.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-semibold transition-all shadow-lg shadow-indigo-600/25 hover:shadow-indigo-500/40">
                    <span class="material-icons-round">login</span>
                    Sign In
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-gray-600 text-sm">
                    Don't have an account?
                    <a href="{% url 'users:register' %}" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors ml-1">Sign up</a>
                </p>
            </div>
        </div>
        
        <!-- Divider -->
        <div class="mt-6 text-center">
            <a href="{% url 'blog:home' %}" class="text-gray-700 hover:text-gray-500 text-sm transition-colors flex items-center justify-center gap-1">
                <span class="material-icons-round text-sm">arrow_back</span>
                Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword() {
    const input = document.getElementById('password-input');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
    } else {
        input.type = 'password';
        icon.textContent = 'visibility';
    }
}
</script>
{% endblock %}
